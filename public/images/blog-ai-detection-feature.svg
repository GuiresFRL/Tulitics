<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#051e14"/>
      <stop offset="60%" style="stop-color:#0a2e2e"/>
      <stop offset="100%" style="stop-color:#0d4a3a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0fb68c;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0fb68c;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Ambient glow circles -->
  <circle cx="900" cy="240" r="280" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="200" cy="100" r="150" fill="#0fb68c" opacity="0.06" filter="url(#blur)"/>

  <!-- Grid lines subtle -->
  <g stroke="#0fb68c" stroke-width="0.4" opacity="0.12">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="480"/>
    <line x1="400" y1="0" x2="400" y2="480"/>
    <line x1="600" y1="0" x2="600" y2="480"/>
    <line x1="800" y1="0" x2="800" y2="480"/>
    <line x1="1000" y1="0" x2="1000" y2="480"/>
  </g>

  <!-- LEFT: Text content -->
  <text x="60" y="100" font-size="13" fill="#0fb68c" font-weight="700" letter-spacing="3">TULITICS INSIGHTS · BLOG</text>
  <text x="60" y="165" font-size="42" fill="white" font-weight="800" line-spacing="1.1">AI-Powered Early</text>
  <text x="60" y="215" font-size="42" fill="white" font-weight="800">Detection Strategies</text>
  <text x="60" y="263" font-size="38" fill="#0fb68c" font-weight="800">for Chronic Diseases</text>
  <text x="60" y="310" font-size="15" fill="#9ecfbe" font-weight="400">Predictive analytics · Machine learning · Preventive care</text>

  <!-- Tag pills -->
  <rect x="60" y="335" width="72" height="26" rx="13" fill="#0fb68c" opacity="0.25"/>
  <text x="96" y="352" font-size="11" fill="#0fb68c" text-anchor="middle" font-weight="600">AI / ML</text>
  <rect x="144" y="335" width="108" height="26" rx="13" fill="#0fb68c" opacity="0.15"/>
  <text x="198" y="352" font-size="11" fill="#0fb68c" text-anchor="middle" font-weight="600">Healthcare</text>
  <rect x="264" y="335" width="130" height="26" rx="13" fill="#0fb68c" opacity="0.15"/>
  <text x="329" y="352" font-size="11" fill="#0fb68c" text-anchor="middle" font-weight="600">Chronic Disease</text>

  <text x="60" y="410" font-size="13" fill="#6aab94">July 13, 2026  ·  12 min read  ·  Tulitics Editorial Team</text>

  <!-- RIGHT: AI brain / neural network illustration -->
  <!-- Central brain node -->
  <circle cx="920" cy="240" r="58" fill="none" stroke="#0fb68c" stroke-width="2" opacity="0.7"/>
  <circle cx="920" cy="240" r="42" fill="#0fb68c" opacity="0.12"/>
  <circle cx="920" cy="240" r="20" fill="#0fb68c" opacity="0.5"/>
  <!-- Brain pulse rings -->
  <circle cx="920" cy="240" r="70" fill="none" stroke="#0fb68c" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 6"/>
  <circle cx="920" cy="240" r="90" fill="none" stroke="#0fb68c" stroke-width="0.5" opacity="0.2" stroke-dasharray="3 8"/>

  <!-- Neural nodes -->
  <!-- Left cluster -->
  <circle cx="760" cy="160" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="760" cy="240" r="18" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="760" cy="320" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="700" cy="200" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>
  <circle cx="700" cy="280" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>

  <!-- Right cluster -->
  <circle cx="1080" cy="160" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="1080" cy="240" r="18" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="1080" cy="320" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="1140" cy="200" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>
  <circle cx="1140" cy="280" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>

  <!-- Top / bottom nodes -->
  <circle cx="920" cy="120" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="860" cy="90" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>
  <circle cx="980" cy="90" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>
  <circle cx="920" cy="360" r="14" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1.5"/>
  <circle cx="860" cy="390" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>
  <circle cx="980" cy="390" r="10" fill="#0a5c3c" stroke="#0fb68c" stroke-width="1"/>

  <!-- Connections: left cluster to center -->
  <line x1="774" y1="160" x2="866" y2="222" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="778" y1="240" x2="862" y2="240" stroke="#0fb68c" stroke-width="1.2" opacity="0.6"/>
  <line x1="774" y1="320" x2="866" y2="258" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="200" x2="746" y2="175" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="700" y1="280" x2="746" y2="305" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="710" y1="200" x2="750" y2="240" stroke="#0fb68c" stroke-width="0.6" opacity="0.3"/>
  <line x1="710" y1="280" x2="750" y2="240" stroke="#0fb68c" stroke-width="0.6" opacity="0.3"/>

  <!-- Connections: right cluster to center -->
  <line x1="1066" y1="160" x2="974" y2="222" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="1062" y1="240" x2="978" y2="240" stroke="#0fb68c" stroke-width="1.2" opacity="0.6"/>
  <line x1="1066" y1="320" x2="974" y2="258" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="1140" y1="200" x2="1094" y2="175" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="1140" y1="280" x2="1094" y2="305" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="1130" y1="200" x2="1090" y2="240" stroke="#0fb68c" stroke-width="0.6" opacity="0.3"/>
  <line x1="1130" y1="280" x2="1090" y2="240" stroke="#0fb68c" stroke-width="0.6" opacity="0.3"/>

  <!-- Top / bottom connections to center -->
  <line x1="920" y1="134" x2="920" y2="182" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="866" y1="98" x2="900" y2="130" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="974" y1="98" x2="940" y2="130" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="920" y1="346" x2="920" y2="298" stroke="#0fb68c" stroke-width="1" opacity="0.5"/>
  <line x1="866" y1="382" x2="900" y2="350" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>
  <line x1="974" y1="382" x2="940" y2="350" stroke="#0fb68c" stroke-width="0.8" opacity="0.4"/>

  <!-- Node labels -->
  <text x="760" y="155" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">ECG</text>
  <text x="760" y="235" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">EHR</text>
  <text x="760" y="315" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Labs</text>
  <text x="1080" y="155" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Risk</text>
  <text x="1080" y="235" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Alert</text>
  <text x="1080" y="315" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Care</text>
  <text x="920" y="118" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Imaging</text>
  <text x="920" y="358" font-size="8" fill="#0fb68c" text-anchor="middle" opacity="0.8">Wearable</text>

  <!-- Center AI label -->
  <text x="920" y="236" font-size="11" fill="white" text-anchor="middle" font-weight="700">AI</text>
  <text x="920" y="250" font-size="9" fill="#0fb68c" text-anchor="middle">Engine</text>

  <!-- Divider line -->
  <line x1="620" y1="60" x2="620" y2="420" stroke="#0fb68c" stroke-width="0.5" opacity="0.2"/>
</svg>
