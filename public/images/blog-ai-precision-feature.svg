<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="55%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#0e2a1e"/>
    </linearGradient>
    <linearGradient id="accentGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0fb68c;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0fb68c;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02"/>
    </linearGradient>
    <filter id="gblur"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="gblur2"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- Glow orbs -->
  <circle cx="920" cy="220" r="240" fill="url(#accentGlow)" filter="url(#gblur)"/>
  <circle cx="120" cy="360" r="200" fill="url(#tealGlow)" filter="url(#gblur)"/>

  <!-- Subtle grid -->
  <g stroke="#7c3aed" stroke-width="0.3" opacity="0.1">
    <line x1="0" y1="96" x2="1200" y2="96"/>
    <line x1="0" y1="192" x2="1200" y2="192"/>
    <line x1="0" y1="288" x2="1200" y2="288"/>
    <line x1="0" y1="384" x2="1200" y2="384"/>
    <line x1="240" y1="0" x2="240" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="720" y1="0" x2="720" y2="480"/>
    <line x1="960" y1="0" x2="960" y2="480"/>
  </g>

  <!-- LEFT: Text -->
  <text x="60" y="98" font-size="12" fill="#a78bfa" font-weight="700" letter-spacing="3">TULITICS INSIGHTS · BLOG</text>
  <text x="60" y="155" font-size="36" fill="white" font-weight="800">AI-Driven Innovations in</text>
  <text x="60" y="200" font-size="36" fill="white" font-weight="800">Precision Medicine</text>
  <text x="60" y="243" font-size="32" fill="#0fb68c" font-weight="800">&amp; Healthcare Delivery</text>
  <text x="60" y="286" font-size="13" fill="#a3c4bc" font-weight="400">Genomics · Personalised Therapy · AI Clinical Intelligence</text>

  <!-- Tag pills -->
  <rect x="60" y="310" width="130" height="26" rx="13" fill="#7c3aed" opacity="0.25"/>
  <text x="125" y="327" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Precision Medicine</text>
  <rect x="202" y="310" width="110" height="26" rx="13" fill="#0fb68c" opacity="0.2"/>
  <text x="257" y="327" font-size="11" fill="#0fb68c" text-anchor="middle" font-weight="600">AI Healthcare</text>
  <rect x="324" y="310" width="90" height="26" rx="13" fill="#7c3aed" opacity="0.15"/>
  <text x="369" y="327" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="600">Genomics</text>

  <text x="60" y="400" font-size="13" fill="#6b8fa8">July 10, 2026  ·  10 min read  ·  Tulitics Editorial Team</text>

  <!-- Divider -->
  <line x1="620" y1="60" x2="620" y2="420" stroke="#7c3aed" stroke-width="0.5" opacity="0.2"/>

  <!-- RIGHT: DNA helix + AI core illustration -->
  <!-- DNA helix backbone left strand -->
  <path d="M700 80 C730 110 760 140 730 170 C700 200 730 230 760 260 C790 290 760 320 730 350 C700 380 730 410 760 440" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity="0.7"/>
  <!-- DNA helix backbone right strand -->
  <path d="M760 80 C730 110 700 140 730 170 C760 200 730 230 700 260 C670 290 700 320 730 350 C760 380 730 410 700 440" fill="none" stroke="#0fb68c" stroke-width="2.5" opacity="0.7"/>
  <!-- DNA crosslinks -->
  <line x1="713" y1="108" x2="747" y2="108" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="136" x2="734" y2="136" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="713" y1="164" x2="747" y2="164" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="192" x2="734" y2="192" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="713" y1="220" x2="747" y2="220" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="248" x2="734" y2="248" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="713" y1="276" x2="747" y2="276" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="304" x2="734" y2="304" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="713" y1="332" x2="747" y2="332" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="360" x2="734" y2="360" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="713" y1="388" x2="747" y2="388" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <line x1="726" y1="416" x2="734" y2="416" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- AI Core -->
  <circle cx="920" cy="220" r="60" fill="#0d1f3c" stroke="#7c3aed" stroke-width="2"/>
  <circle cx="920" cy="220" r="44" fill="#7c3aed" opacity="0.1"/>
  <circle cx="920" cy="220" r="26" fill="#7c3aed" opacity="0.35"/>
  <circle cx="920" cy="220" r="70" fill="none" stroke="#7c3aed" stroke-width="0.7" opacity="0.3" stroke-dasharray="5 5"/>
  <circle cx="920" cy="220" r="88" fill="none" stroke="#0fb68c" stroke-width="0.5" opacity="0.2" stroke-dasharray="3 7"/>
  <text x="920" y="216" font-size="10" fill="white" text-anchor="middle" font-weight="700">Precision</text>
  <text x="920" y="230" font-size="10" fill="#a78bfa" text-anchor="middle" font-weight="700">AI Core</text>

  <!-- Lines from DNA to AI core -->
  <line x1="760" y1="200" x2="856" y2="213" stroke="#7c3aed" stroke-width="1.2" opacity="0.5" stroke-dasharray="4 3"/>
  <line x1="760" y1="220" x2="856" y2="220" stroke="#0fb68c" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 3"/>
  <line x1="760" y1="240" x2="856" y2="227" stroke="#7c3aed" stroke-width="1.2" opacity="0.5" stroke-dasharray="4 3"/>

  <!-- Input tags (left of DNA) -->
  <rect x="640" y="112" width="48" height="22" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="664" y="127" font-size="8" fill="#a78bfa" text-anchor="middle" font-weight="600">Genomic</text>
  <rect x="640" y="200" width="48" height="22" rx="4" fill="#0fb68c" opacity="0.25"/>
  <text x="664" y="215" font-size="8" fill="#0fb68c" text-anchor="middle" font-weight="600">EHR Data</text>
  <rect x="640" y="290" width="48" height="22" rx="4" fill="#7c3aed" opacity="0.3"/>
  <text x="664" y="305" font-size="8" fill="#a78bfa" text-anchor="middle" font-weight="600">Imaging</text>

  <!-- Output cards (right of AI core) -->
  <rect x="998" y="120" width="115" height="50" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
  <text x="1055" y="142" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="700">Precision Oncology</text>
  <text x="1055" y="157" font-size="8" fill="#c4b5fd" text-anchor="middle">Targeted Treatment</text>
  <text x="1055" y="167" font-size="11" text-anchor="middle">🧬</text>

  <rect x="998" y="194" width="115" height="50" rx="8" fill="url(#cardGrad)" stroke="#0fb68c" stroke-width="1.5" opacity="0.9"/>
  <text x="1055" y="216" font-size="9" fill="#0fb68c" text-anchor="middle" font-weight="700">Precision Diagnostics</text>
  <text x="1055" y="231" font-size="8" fill="#6ee7b7" text-anchor="middle">AI-Enhanced</text>
  <text x="1055" y="241" font-size="11" text-anchor="middle">🔬</text>

  <rect x="998" y="268" width="115" height="50" rx="8" fill="url(#cardGrad)" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
  <text x="1055" y="290" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="700">Precision Cardiology</text>
  <text x="1055" y="305" font-size="8" fill="#c4b5fd" text-anchor="middle">Risk Stratification</text>
  <text x="1055" y="315" font-size="11" text-anchor="middle">❤️</text>

  <!-- Lines from AI core to outputs -->
  <line x1="978" y1="196" x2="998" y2="155" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="980" y1="220" x2="998" y2="220" stroke="#0fb68c" stroke-width="1.2" opacity="0.6"/>
  <line x1="978" y1="244" x2="998" y2="288" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>

  <!-- Pulse line at bottom -->
  <path d="M640 415 L680 415 L695 390 L710 440 L725 400 L740 415 L780 415 L795 402 L810 428 L825 408 L840 415 L1155 415" fill="none" stroke="#0fb68c" stroke-width="1.5" opacity="0.3"/>
</svg>
