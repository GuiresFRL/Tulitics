<svg viewBox="0 0 1100 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0e2a1e"/>
    </linearGradient>
    <linearGradient id="stepGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0fb68c;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0fb68c;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="220" rx="16" fill="url(#bg)"/>
  <rect width="1100" height="220" rx="16" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <text x="550" y="32" font-size="13" fill="#a78bfa" text-anchor="middle" font-weight="700" letter-spacing="2">AI PRECISION MEDICINE WORKFLOW</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="55" width="170" height="120" rx="12" fill="url(#stepGrad1)" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="115" y="95" font-size="22" text-anchor="middle">🧬</text>
  <text x="115" y="118" font-size="11" fill="white" text-anchor="middle" font-weight="700">Patient Data</text>
  <text x="115" y="133" font-size="9" fill="#c4b5fd" text-anchor="middle">Genomic · EHR</text>
  <text x="115" y="147" font-size="9" fill="#c4b5fd" text-anchor="middle">Imaging · Lifestyle</text>
  <circle cx="115" cy="62" r="10" fill="#7c3aed" opacity="0.6"/>
  <text x="115" y="66" font-size="10" fill="white" text-anchor="middle" font-weight="700">1</text>

  <!-- Arrow 1 -->
  <path d="M200 115 L235 115" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed" opacity="0.7"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0fb68c" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Step 2 -->
  <rect x="235" y="55" width="170" height="120" rx="12" fill="url(#stepGrad2)" stroke="#0fb68c" stroke-width="1.2"/>
  <text x="320" y="95" font-size="22" text-anchor="middle">🤖</text>
  <text x="320" y="118" font-size="11" fill="white" text-anchor="middle" font-weight="700">AI / ML Analysis</text>
  <text x="320" y="133" font-size="9" fill="#6ee7b7" text-anchor="middle">Deep Learning</text>
  <text x="320" y="147" font-size="9" fill="#6ee7b7" text-anchor="middle">Pattern Recognition</text>
  <circle cx="320" cy="62" r="10" fill="#0fb68c" opacity="0.6"/>
  <text x="320" y="66" font-size="10" fill="white" text-anchor="middle" font-weight="700">2</text>

  <!-- Arrow 2 -->
  <path d="M405 115 L440 115" stroke="#0fb68c" stroke-width="2" marker-end="url(#arr2)" opacity="0.7"/>

  <!-- Step 3 -->
  <rect x="440" y="55" width="170" height="120" rx="12" fill="url(#stepGrad1)" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="525" y="95" font-size="22" text-anchor="middle">🎯</text>
  <text x="525" y="118" font-size="11" fill="white" text-anchor="middle" font-weight="700">Risk Stratification</text>
  <text x="525" y="133" font-size="9" fill="#c4b5fd" text-anchor="middle">Variant Interpretation</text>
  <text x="525" y="147" font-size="9" fill="#c4b5fd" text-anchor="middle">Predictive Modelling</text>
  <circle cx="525" cy="62" r="10" fill="#7c3aed" opacity="0.6"/>
  <text x="525" y="66" font-size="10" fill="white" text-anchor="middle" font-weight="700">3</text>

  <!-- Arrow 3 -->
  <path d="M610 115 L645 115" stroke="#7c3aed" stroke-width="2" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Step 4 -->
  <rect x="645" y="55" width="170" height="120" rx="12" fill="url(#stepGrad2)" stroke="#0fb68c" stroke-width="1.2"/>
  <text x="730" y="95" font-size="22" text-anchor="middle">💊</text>
  <text x="730" y="118" font-size="11" fill="white" text-anchor="middle" font-weight="700">Personalised Plan</text>
  <text x="730" y="133" font-size="9" fill="#6ee7b7" text-anchor="middle">Targeted Therapy</text>
  <text x="730" y="147" font-size="9" fill="#6ee7b7" text-anchor="middle">Drug Selection</text>
  <circle cx="730" cy="62" r="10" fill="#0fb68c" opacity="0.6"/>
  <text x="730" y="66" font-size="10" fill="white" text-anchor="middle" font-weight="700">4</text>

  <!-- Arrow 4 -->
  <path d="M815 115 L850 115" stroke="#0fb68c" stroke-width="2" marker-end="url(#arr2)" opacity="0.7"/>

  <!-- Step 5 -->
  <rect x="850" y="55" width="200" height="120" rx="12" fill="url(#stepGrad1)" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="950" y="95" font-size="22" text-anchor="middle">📡</text>
  <text x="950" y="118" font-size="11" fill="white" text-anchor="middle" font-weight="700">Continuous Monitoring</text>
  <text x="950" y="133" font-size="9" fill="#c4b5fd" text-anchor="middle">Wearables · Remote</text>
  <text x="950" y="147" font-size="9" fill="#c4b5fd" text-anchor="middle">Adaptive Feedback</text>
  <circle cx="950" cy="62" r="10" fill="#7c3aed" opacity="0.6"/>
  <text x="950" y="66" font-size="10" fill="white" text-anchor="middle" font-weight="700">5</text>

  <!-- Feedback arc -->
  <path d="M950 175 Q550 215 115 175" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.4"/>
  <text x="550" y="208" font-size="8" fill="#a78bfa" text-anchor="middle" opacity="0.6">Continuous Learning Loop</text>
</svg>
